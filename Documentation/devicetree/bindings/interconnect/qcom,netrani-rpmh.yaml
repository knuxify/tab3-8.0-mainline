%YAML 1.2
---
$id: http://devicetree.org/schemas/interconnect/qcom,netrani-rpmh.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm RPMh Network-On-Chip Interconnect on Netrani SoC

maintainers:
  - Artur Weber <aweber.kernel@gmail.com>

description: |
  RPMh interconnect providers support system bandwidth requirements through
  RPMh hardware accelerators known as Bus Clock Manager (BCM). The provider is
  able to communicate with the BCM through the Resource State Coordinator (RSC)
  associated with each execution environment. Provider nodes must point to at
  least one RPMh device child node pertaining to their RSC and each provider
  can map to multiple RPMh resources.

  See also: include/dt-bindings/interconnect/qcom,netrani-rpmh.h

properties:
  compatible:
    enum:
      - qcom,netrani-aggre1-noc
      - qcom,netrani-aggre2-noc
      - qcom,netrani-clk-virt
      - qcom,netrani-cnoc2
      - qcom,netrani-cnoc3
      - qcom,netrani-gem-noc
      - qcom,netrani-lpass-ag-noc
      - qcom,netrani-mc-virt
      - qcom,netrani-mmss-noc
      - qcom,netrani-nsp-noc
      - qcom,netrani-pcie-anoc
      - qcom,netrani-system-noc

  reg:
    maxItems: 1

  clocks:
    minItems: 1
    maxItems: 2

required:
  - compatible

allOf:
  - $ref: qcom,rpmh-common.yaml#
  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,netrani-clk-virt
              - qcom,netrani-mc-virt
    then:
      properties:
        reg: false
    else:
      required:
        - reg

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,netrani-pcie-anoc
    then:
      properties:
        clocks:
          items:
            - description: aggre-NOC PCIe AXI clock
            - description: cfg-NOC PCIe a-NOC AHB clock

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,netrani-aggre1-noc
    then:
      properties:
        clocks:
          items:
            - description: aggre USB3 PRIM AXI clock
            - description: aggre UFS PHY AXI clock

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,netrani-aggre2-noc
    then:
      properties:
        clocks:
          items:
            - description: RPMH CC IPA clock

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,netrani-aggre1-noc
              - qcom,netrani-aggre2-noc
              - qcom,netrani-pcie-anoc
    then:
      required:
        - clocks
    else:
      properties:
        clocks: false

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/clock/qcom,netrani-gcc.h>

    interconnect-0 {
        compatible = "qcom,netrani-clk-virt";
        #interconnect-cells = <2>;
        qcom,bcm-voters = <&apps_bcm_voter>;
    };

    interconnect@16e0000 {
        compatible = "qcom,netrani-aggre1-noc";
        reg = <0x016e0000 0x16400>;
        #interconnect-cells = <2>;
        clocks = <&gcc GCC_AGGRE_USB3_PRIM_AXI_CLK>,
                 <&gcc GCC_AGGRE_UFS_PHY_AXI_CLK>;
        qcom,bcm-voters = <&apps_bcm_voter>;
    };
